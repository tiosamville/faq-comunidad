<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo</title>
</head>
<body>
    <h1>Gestión de Preguntas</h1>
    
    {% for p in preguntas %}
        <div style="border: 1px solid #ccc; padding: 10px; margin: 10px;">
            <p><strong>#{{ loop.index }} - Pregunta:</strong> {{ p[1] }}</p>
            
            {% if p[3] == 'pendiente' %}
                <form action="/responder/{{ p[0] }}" method="POST">
                    <textarea name="respuesta" placeholder="Escribe la respuesta aquí..." required></textarea>
                    <button type="submit">Publicar Respuesta</button>
                </form>
            {% else %}
                <form action="/actualizar/{{ p[0] }}" method="POST">
                    <textarea name="respuesta" required>{{ p[2] }}</textarea>
                    <button type="submit">Guardar Cambios</button>
                </form>
            {% endif %}
            
            <br>
            <a href="/eliminar/{{ p[0] }}" style="color: red; font-size: 0.9em;" 
               onclick="return confirm('¿Estás seguro de que quieres eliminar esta pregunta?')">
                Eliminar pregunta
            </a>
        </div>
    {% endfor %}
    
    <br>
    <a href="/">Volver a la página principal</a>
</body>
</html>
